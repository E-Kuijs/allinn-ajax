name: Production Deploy (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        if: hashFiles('package.json') != ''
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Install dependencies (fallback)
        if: hashFiles('package-lock.json') == '' && hashFiles('package.json') != ''
        run: npm install

      - name: Build (if package.json exists)
        if: hashFiles('package.json') != ''
        run: |
          npm run build:web --if-present
          npm run build --if-present

      - name: Determine publish dir
        run: |
          if [ -d "www" ]; then
            echo "PUBLISH_DIR=www" >> $GITHUB_ENV
          elif [ -d "build" ]; then
            echo "PUBLISH_DIR=build" >> $GITHUB_ENV
          elif [ -d "dist" ]; then
            echo "PUBLISH_DIR=dist" >> $GITHUB_ENV
          elif [ -d "public" ]; then
            echo "PUBLISH_DIR=public" >> $GITHUB_ENV
          else
            echo "PUBLISH_DIR=." >> $GITHUB_ENV
          fi

      - name: Deploy production to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx netlify-cli deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir "$PUBLISH_DIR" \
            --prod

